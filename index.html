const SUPABASE_URL  = 'https://pcmsswzhlqfenfrlhcne.supabase.co';   // e.g. https://xxxx.supabase.co
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBjbXNzd3pobHFmZW5mcmxoY25lIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczNjM3MDksImV4cCI6MjA5MjkzOTcwOX0.qUwCMZ7at7Iitz3JOwqjcMhktUZIyGlECpjDM4xBMIc'; // from Project Settings → API

const MODEL = 'claude-sonnet-4-6';

// ── SUPABASE CLIENT ───────────────────────────────────────────
let db = null;
function initDB() {
  if (SUPABASE_URL === 'YOUR_SUPABASE_URL') return null;
  db = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);
  return db;
}

// ── DB HELPERS ────────────────────────────────────────────────
const DB = {
  async getUsers() {
    const {data,error} = await db.from('cms_users').select('*').order('created_at');
    if (error) throw error;
    return data || [];
  },
  async createUser(u) {
    const {data,error} = await db.from('cms_users').insert(u).select().single();
    if (error) throw error;
    return data;
  },
  async updateUser(id, patch) {
    const {error} = await db.from('cms_users').update(patch).eq('id', id);
    if (error) throw error;
  },
  async deleteUser(id) {
    const {error} = await db.from('cms_users').delete().eq('id', id);
    if (error) throw error;
  },
  async getArticles() {
    const {data,error} = await db.from('cms_articles').select('*').order('created_at', {ascending:false});
    if (error) throw error;
    return data || [];
  },
  async saveArticle(a) {
    const {data,error} = await db.from('cms_articles').insert(a).select().single();
    if (error) throw error;
    return data;
  },
  async deleteArticle(id) {
    const {error} = await db.from('cms_articles').delete().eq('id', id);
    if (error) throw error;
  },
  async getApiKey(userId) {
    const {data} = await db.from('cms_api_keys').select('api_key').eq('user_id', userId).single();
    return data?.api_key || '';
  },
  async saveApiKey(userId, apiKey) {
    const {error} = await db.from('cms_api_keys').upsert({user_id:userId, api_key:apiKey, updated_at:new Date().toISOString()});
    if (error) throw error;

};

// ── SYSTEM PROMPTS ────────────────────────────────────────────
const SYS_TRENDING = `You are a news intelligence engine. Search the web RIGHT NOW for the top 12 trending news stories across India, United States, and UAE. Return ONLY a valid JSON array — no markdown, no backticks. Each object: {"id":"unique_id_1","region":"India"|"US"|"UAE","category":"Politics"|"Business"|"Technology"|"Sports"|"Entertainment"|"World"|"Science"|"Health","title":"Compelling English headline (max 90 chars)","summary":"2-sentence factual summary (max 200 chars)","sources":["source1","source2"],"keywords":["kw1","kw2","kw3"]}. Return exactly 12 items: 4 India, 4 US, 4 UAE. Real current stories only.`;

const SYS_ARTICLE = `You are a senior journalist at kannadadunia.com. Write a FRESH ORIGINAL Kannada news article (minimum 450 words). NOT a translation. Pure natural Kannada. Return ONLY valid JSON no markdown: {"headline":"","subheadline":"","seoTitle":"","metaDescription":"","slug":"english-slug","keywords":["k1","k2","k3","k4","k5","k6"],"schema":"NewsArticle","discoverScore":8,"discoverTip":"","imageAlt":"","article":"Full Kannada article with \\n\\n between paragraphs","wordCount":480}`;

// ── HELPERS ───────────────────────────────────────────────────
const todayStr = () => new Date().toISOString().slice(0,10);
const weekAgo  = () => new Date(Date.now()-7*86400000).toISOString().slice(0,10);
const fD = d => new Date(d).toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'});
const fT = d => new Date(d).toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'});
const esc = s => s ? String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;') : '';
// Password hashing — uses native browser SubtleCrypto (SHA-256 + salt prefix)
// Format stored: "sha256:SALT:HASH"
async function hashPw(pw) {
  const salt = crypto.getRandomValues(new Uint8Array(16));
  const saltHex = Array.from(salt).map(b=>b.toString(16).padStart(2,'0')).join('');
  const enc = new TextEncoder().encode(saltHex + pw);
  const buf = await crypto.subtle.digest('SHA-256', enc);
  const hash = Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
  return `sha256:${saltHex}:${hash}`;
}
async function checkPw(pw, stored) {
  // Support legacy plain-text passwords (seed admin uses bcrypt hash — handle gracefully)
  if (!stored) return false;
  if (stored.startsWith('sha256:')) {
    const [, saltHex, storedHash] = stored.split(':');
    const enc = new TextEncoder().encode(saltHex + pw);
    const buf = await crypto.subtle.digest('SHA-256', enc);
    const hash = Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
    return hash === storedHash;
  }
  // Fallback: plain text comparison (only for initial seed admin before first password change)
  return pw === stored;
}

// ── STATE ─────────────────────────────────────────────────────
let S = {
  ready: false, pg: 'boot', user: null,
  users: [], arts: [], apiKey: '',
  tab: 'trending', atab: 'dash', itype: 'url',

};

// ── CLAUDE API ────────────────────────────────────────────────
async function apiCall(system, userMsg, useSearch = false) {
  if (!S.apiKey || !S.apiKey.startsWith('sk-ant-'))
    throw new Error('Add your Anthropic API key in Settings first.');
  const body = {model:MODEL, max_tokens:8000, system, messages:[{role:'user',content:userMsg}]};
  if (useSearch) body.tools = [{type:'web_search_20250305',name:'web_search'}];
  let msgs = [{role:'user',content:userMsg}];
  for (let i = 0; i < 15; i++) {
    const rb = {...body, messages:msgs};
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': S.apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify(rb)
    });
    const d = await res.json();
    if (!res.ok) throw new Error(d.error?.message || `API Error ${res.status}`);
    const txt = (d.content||[]).filter(b => b.type==='text');
    const tu  = (d.content||[]).filter(b => b.type==='tool_use');
    if (tu.length) {
      msgs.push({role:'assistant',content:d.content});
      msgs.push({role:'user',content:tu.map(tb=>({type:'tool_result',tool_use_id:tb.id,content:[]}))});
      continue;
    }
    if (d.stop_reason==='end_turn' || txt.length) {
      const t = txt.map(b=>b.text).join('');
      const c = t.replace(/```json\n?|```/g,'').trim();
      const m = c.match(/(\[[\s\S]*\]|\{[\s\S]*\})/);
      try { return JSON.parse(m ? m[0] : c); }
      catch { throw new Error('Parse error — please try again.'); }
    }
    break;
  }
  throw new Error('Generation failed — please try again.');
}

function renderDash() {
  const writers = S.users.filter(u => u.role==='writer');

  const wk = S.arts.filter(a => a.created_at?.slice(0,10)>=weekAgo());

        ${S.users.map(u=>{
          const ac = S.arts.filter(a=>a.user_id===u.id).length;
          return `<tr><td style="font-weight:500">${esc(u.name)}</td><td><code>@${esc(u.username)}</code></td><td><span class="bdg bdg-${u.role}">${u.role}</span></td><td style="color:var(--text2)">${fD(u.created_at)}</td><td>${ac}</td><td>${u.id!==S.user.id?`<button onclick="doDelUser('${u.id}')" class="sm danger">Delete</button>`:`<span style="font-size:11px;color:var(--text2)">You</span>`}</td></tr>`;
        }).join('')}
      </tbody></table>
    </div>
  </div>`;
}

// ── ADMIN: ALL ARTICLES ───────────────────────────────────────
function renderAllArts() {
  return `<div class="fade">
    <div class="pg-hd"><div class="pg-ttl">All Articles (${S.arts.length})</div><div class="pg-sub">Complete history · Supabase database</div></div>
    <div class="card" style="padding:0">
      ${!S.arts.length?`<div class="ph">No articles yet.</div>`:
        S.arts.map(a=>`<div class="art-item" onclick="toggleX('${a.id}')">
          <div style="font-size:14px;font-weight:500;font-family:'Noto Sans Kannada',sans-serif">${esc(a.headline)}</div>
          <div class="art-meta">${a.region?regionBdg(a.region):''}<span style="font-weight:500">${esc(a.user_name)}</span><span>${fD(a.created_at)}, ${fT(a.created_at)}</span>${a.discover_score?`<span style="color:var(--stx);font-weight:500">Discover ${a.discover_score}/10</span>`:''}</div>
          ${S.xid===a.id?`<div style="margin-top:.875rem;padding-top:.875rem;border-top:0.5px solid var(--bd)">
            <div class="seo-grid">${seoF('SEO Title',a.seo_title,true)}${seoF('Meta',a.meta_description,true)}</div>
            <div class="kn" style="font-size:14px;line-height:2;white-space:pre-wrap;margin-top:.875rem">${esc(a.article)}</div>
            <div style="display:flex;gap:8px;margin-top:.875rem">
              <button onclick="event.stopPropagation();cpArt('${a.id}')" class="sm">Copy</button>
              <button onclick="event.stopPropagation();delArt('${a.id}')" class="sm danger">Delete</button>
            </div>
          </div>`:''}
        </div>`).join('')}
    </div>
  </div>`;
}

// ── MAIN RENDER ───────────────────────────────────────────────
function render() {
  const el = document.getElementById('app');
  if (S.pg==='boot') { el.innerHTML=`<div style="min-height:100vh;display:flex;align-items:center;justify-content:center"><div style="display:flex;align-items:center;gap:10px;color:var(--text2)"><div class="spin"></div>Connecting to Supabase…</div></div>`; return; }
  if (S.pg==='setup') { el.innerHTML=renderSetup(); return; }
  if (S.pg==='login') { el.innerHTML=renderLogin(); return; }
  const isAdmin = S.user?.role==='admin';
  let main;
  if (isAdmin) { main=({dash:renderDash,users:renderUsers,arts:renderAllArts,trending:renderTrending,gen:renderGen,settings:renderSettings}[S.atab]||renderDash)(); }
  else { main=({trending:renderTrending,gen:renderGen,mine:renderMine,settings:renderSettings}[S.tab]||renderTrending)(); }
  el.innerHTML=`<div class="app-shell">${renderSidebar()}<div class="page">${main}</div></div>`;
}

// ── AUTH ACTIONS ──────────────────────────────────────────────
async function doLogin() {
  const u = document.getElementById('lu')?.value?.trim();
  const p = document.getElementById('lp')?.value;
  if (!u||!p) { S.lErr='Please enter username and password.'; render(); return; }
  const btn = document.getElementById('loginBtn');
  if (btn) { btn.disabled=true; btn.innerHTML='<span class="spin"></span> Signing in…'; }
  try {
    const {data,error} = await db.from('cms_users').select('*').eq('username',u).single();
    if (error||!data) throw new Error('User not found.');
    const ok = await checkPw(p, data.password);
    if (!ok) throw new Error('Incorrect password.');
    S.user = data;
    S.pg = 'app';
    S.lErr = '';
    sessionStorage.setItem('kdp_sess', JSON.stringify({id:data.id,username:data.username}));
    // Load data
    await refreshData();
    S.apiKey = await DB.getApiKey(data.id);
    render();
  } catch(e) {
    S.lErr = e.message;
    render();
  }
}

async function doLogout() {
  sessionStorage.removeItem('kdp_sess');
  S.user=null; S.pg='login'; S.genned=null; S.err=null; S.ok=null; S.apiKey=''; S.arts=[]; S.users=[];
  render();
}

async function refreshData() {
  S.users = await DB.getUsers();
  S.arts  = await DB.getArticles();
}

// ── NAV ───────────────────────────────────────────────────────
function setTab(t)  { S.tab=t;  S.err=null; S.ok=null; S.xid=null; render(); }
function setATab(t) { S.atab=t; S.err=null; S.ok=null; S.xid=null; render(); }
function setIT(t)   { S.itype=t; S.err=null; S.saved=''; render(); }
function toggleX(id){ S.xid=S.xid===id?null:id; render(); }
function setFilter(type,val) { if(type==='region') S.regionFilter=val; else S.catFilter=val; render(); }

// ── TRENDING ──────────────────────────────────────────────────
async function loadTrending(force=false) {
  if (S.trendLoading) return;
  if (S.trendLoaded&&!force) return;
  S.trendLoading=true; S.trendErr=null; render();
  try {
    const data = await apiCall(SYS_TRENDING,'Search for the top 12 trending news stories right now from India, United States, and UAE. Return as JSON array.',true);
    S.trends = Array.isArray(data)?data:[];
    S.trendLoaded=true; S.trendLoading=false; render();
  } catch(e) { S.trendErr=e.message; S.trendLoading=false; render(); }
}

async function genFromTrend(id) {
  const t = S.trends.find(x=>x.id===id);
  if (!t) return;
  S.trendGenId=id; S.genning=true; render();
  try {
    const prompt = `Write a fresh original Kannada news article about this trending story:\n\nTitle: ${t.title}\nSummary: ${t.summary}\nRegion: ${t.region}\nCategory: ${t.category}\nSources: ${(t.sources||[]).join(', ')}\n\nSearch the web for latest details. Write original Kannada — not a translation. Optimise for Google Discover.`;
    const art = await apiCall(SYS_ARTICLE, prompt, true);
    const rec = {
      user_id: S.user.id, user_name: S.user.name, username: S.user.username,
      headline: art.headline, subheadline: art.subheadline, article: art.article,
      seo_title: art.seoTitle, meta_description: art.metaDescription, slug: art.slug,
      keywords: art.keywords||[], schema_type: art.schema||'NewsArticle',
      discover_score: art.discoverScore, discover_tip: art.discoverTip,
      image_alt: art.imageAlt, word_count: art.wordCount,
      region: t.region, category: t.category, input_type: 'trend', trend_title: t.title
    };
    const saved = await DB.saveArticle(rec);
    S.arts = [saved, ...S.arts];
    S.genned = saved;
    S.trendGenId=null; S.genning=false;
    if (S.user.role==='admin') S.atab='gen'; else S.tab='gen';
    render();
  } catch(e) { S.trendGenId=null; S.genning=false; S.trendErr=e.message; render(); }
}

// ── GENERATE ──────────────────────────────────────────────────
async function doGen() {
  const el = document.getElementById('src');
  const input = el?.value?.trim();
  if (!input) { S.err='Please enter a URL or paste article content.'; render(); return; }
  S.saved=input; S.genning=true; S.err=null; S.ok=null; S.genned=null; render();
  try {
    const msg = S.itype==='url'
      ? `News article URL: ${input}\n\nFetch this page, find authentic details, then write a fresh original Kannada article. NOT a translation. Optimise for Google Discover.`
      : `Source content:\n\n${input}\n\nWrite a fresh original Kannada article. NOT a translation. Optimise for Google Discover.`;
    const art = await apiCall(SYS_ARTICLE, msg, S.itype==='url');
    const rec = {
      user_id: S.user.id, user_name: S.user.name, username: S.user.username,
      headline: art.headline, subheadline: art.subheadline, article: art.article,
      seo_title: art.seoTitle, meta_description: art.metaDescription, slug: art.slug,
      keywords: art.keywords||[], schema_type: art.schema||'NewsArticle',
      discover_score: art.discoverScore, discover_tip: art.discoverTip,
      image_alt: art.imageAlt, word_count: art.wordCount,
      input_type: S.itype, source_url: S.itype==='url'?input:null
    };
    const saved = await DB.saveArticle(rec);
    S.arts = [saved, ...S.arts];
    S.genned = saved;
    S.ok = '✓ Article generated and saved to Supabase!';
    S.genning=false; render();
  } catch(e) { S.err=e.message; S.genning=false; render(); }
}

// ── USERS ─────────────────────────────────────────────────────
async function doCreateUser() {
  const name  = document.getElementById('nn')?.value?.trim();
  const uname = document.getElementById('nu')?.value?.trim();
  const pass  = document.getElementById('np')?.value;
  const role  = document.getElementById('nr')?.value;
  if (!name||!uname||!pass) { S.err='All fields are required.'; render(); return; }
  if (pass.length<6) { S.err='Password must be at least 6 characters.'; render(); return; }
  if (S.users.find(u=>u.username===uname)) { S.err=`Username "@${uname}" already taken.`; render(); return; }
  const btn = document.getElementById('createUserBtn');
  if (btn) btn.disabled=true;
  try {
    const hashed = await hashPw(pass);
    const nu = await DB.createUser({username:uname, password:hashed, name, role});
    S.users = [...S.users, nu];
    S.ok=`User "${name}" created.`; S.err=null; render();
  } catch(e) { S.err=e.message; render(); }
}

async function doDelUser(id) {
  if (!confirm('Delete this user? Their articles will remain.')) return;
  try {
    await DB.deleteUser(id);
    S.users=S.users.filter(u=>u.id!==id);
    S.ok='User deleted.'; render();
  } catch(e) { S.err=e.message; render(); }
}

async function delArt(id) {
  if (!confirm('Delete this article permanently?')) return;
  try {
    await DB.deleteArticle(id);
    S.arts=S.arts.filter(a=>a.id!==id);
    S.xid=null; render();
  } catch(e) { alert('Delete failed: '+e.message); }
}

// ── SETTINGS ACTIONS ──────────────────────────────────────────
async function saveKey() {
  const k = document.getElementById('ak')?.value?.trim();
  if (k&&!k.startsWith('sk-ant-')) { alert('Invalid key. Anthropic keys start with sk-ant-'); return; }
  try {
    await DB.saveApiKey(S.user.id, k);
    S.apiKey=k; S.settingsMsg='API key saved to Supabase.'; render();
  } catch(e) { alert('Save failed: '+e.message); }
}

async function changePass() {
  const p1 = document.getElementById('cp1')?.value;
  const p2 = document.getElementById('cp2')?.value;
  if (!p1||p1.length<6) { alert('Password must be at least 6 characters.'); return; }
  if (p1!==p2) { alert('Passwords do not match.'); return; }
  try {
    const hashed = await hashPw(p1);
    await DB.updateUser(S.user.id, {password:hashed});
    S.users=S.users.map(u=>u.id===S.user.id?{...u,password:hashed}:u);
    S.settingsMsg='Password updated.'; render();
  } catch(e) { alert('Update failed: '+e.message); }
}

// ── COPY ──────────────────────────────────────────────────────
function cpAll() {
  const a = S.genned; if (!a) return;
  const t = `HEADLINE: ${a.headline}\nSUBHEADLINE: ${a.subheadline}\n\nSEO Title: ${a.seo_title||a.seoTitle}\nMeta: ${a.meta_description||a.metaDescription}\nSlug: /${a.slug}/\nDiscover: ${a.discover_score||a.discoverScore}/10\nKeywords: ${(a.keywords||[]).join(', ')}\n\n── ARTICLE ──\n\n${a.article}`;
  navigator.clipboard.writeText(t).then(()=>{const el=document.getElementById('cps');if(el){el.style.display='inline';setTimeout(()=>el.style.display='none',2000);}}).catch(()=>{});
}
function cpArt(id) { const a=S.arts.find(x=>x.id===id); if(a) navigator.clipboard.writeText(`${a.headline}\n\n${a.article}`).catch(()=>{}); }
function cpArtObj(a) { navigator.clipboard.writeText(`${a.headline}\n\n${a.article}`).catch(()=>{}); }

Object.assign(window,{doLogin,doLogout,setTab,setATab,setIT,toggleX,setFilter,loadTrending,genFromTrend,doGen,doCreateUser,doDelUser,delArt,saveKey,changePass,cpAll,cpArt,cpArtObj});

// ── BOOT ──────────────────────────────────────────────────────
(async function boot() {
  db = initDB();
  if (!db) { S.pg='setup'; render(); return; }
  // Check session
  try {
    const sess = sessionStorage.getItem('kdp_sess');
    if (sess) {
      const {id} = JSON.parse(sess);
      const {data} = await db.from('cms_users').select('*').eq('id',id).single();
      if (data) {
        S.user = data;
        S.pg   = 'app';
        await refreshData();
        S.apiKey = await DB.getApiKey(data.id);
        render();
        return;
      }
    }
  } catch(e) {}
  S.pg='login'; render();
})();
</script>
</body>
