name: TrendingVerse Bot Automation

# This section tells GitHub WHEN to run the bot
on:
  schedule:
    # This uses Cron syntax. '0 */6 * * *' means every 6 hours.
    # You can change this to '0 0 * * *' to run once a day at midnight.
    - cron: '0 */6 * * *' 
  workflow_dispatch: # This allows you to click a button and run it manually for testing

jobs:
  run-news-bot:
    runs-on: ubuntu-latest # Uses a virtual Linux machine

    steps:
      # 1. Pulls your code from the repository into the virtual machine
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Sets up the Python environment
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      # 3. Installs the libraries listed in your requirements.txt
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 4. Executes the bot and passes the secrets from GitHub to the script
      - name: Run Python Bot
        env:
          # These connect your GitHub Secrets to the variables in bot.py
          WP_USER: ${{ secrets.WP_USER }}
          WP_APP_PW: ${{ secrets.WP_APP_PW }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python bot.py
