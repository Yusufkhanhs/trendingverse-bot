<!DOCTYPE html>
<html lang="kn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ಕನ್ನಡ ದುನಿಯಾ CMS — Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Kannada:wght@400;500;600&family=DM+Sans:wght@400;500;600&family=DM+Mono&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#fff;--bg2:#f8f8f6;--bg3:#f1f1ee;--bg4:#e9e9e5;
  --text:#181816;--text2:#5c5c58;--text3:#9c9c96;
  --bd:rgba(0,0,0,0.09);--bd2:rgba(0,0,0,0.16);
  --ibg:#e6f1fb;--itx:#185fa5;--ibd:rgba(24,95,165,0.2);
  --sbg:#eaf3de;--stx:#3b6d11;--sbd:rgba(59,109,17,0.2);
  --dbg:#fcebeb;--dtx:#a32d2d;--dbd:rgba(163,45,45,0.2);
  --wbg:#faeeda;--wtx:#854f0b;--wbd:rgba(133,79,11,0.2);
  --pbg:#EEEDFE;--ptx:#534AB7;--pbd:rgba(83,74,183,0.2);
  --r:8px;--rl:12px;--rxl:16px;
  --sidebar:228px;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#1c1c1a;--bg2:#232321;--bg3:#2a2a28;--bg4:#333330;
  --text:#f0f0ec;--text2:#9c9c96;--text3:#5c5c58;
  --bd:rgba(255,255,255,0.09);--bd2:rgba(255,255,255,0.16);
  --ibg:#0c2a42;--itx:#85b7eb;--sbg:#172e08;--stx:#97c459;
  --dbg:#2d1212;--dtx:#f09595;--wbg:#2c1e08;--wtx:#ef9f27;
  --pbg:#26215C;--ptx:#AFA9EC;
}}
body{font-family:'DM Sans',sans-serif;font-size:14px;line-height:1.6;background:var(--bg3);color:var(--text);min-height:100vh}
.kn{font-family:'Noto Sans Kannada',sans-serif;line-height:1.95}
/* ── LAYOUT ── */
.app-shell{display:flex;min-height:100vh}
.sidebar{width:var(--sidebar);background:var(--bg2);border-right:0.5px solid var(--bd);display:flex;flex-direction:column;padding:1.25rem 1rem;position:fixed;top:0;left:0;bottom:0;overflow-y:auto;z-index:100}
.page{flex:1;margin-left:var(--sidebar);padding:2rem 2.5rem;min-width:0;max-width:960px}
/* ── LOGIN ── */
.login-shell{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg3);padding:2rem}
.login-card{width:100%;max-width:390px;background:var(--bg);border:0.5px solid var(--bd);border-radius:var(--rxl);padding:2.5rem;box-shadow:0 8px 32px rgba(0,0,0,0.07)}
/* ── NAV ── */
.nav-sec{font-size:10px;color:var(--text3);padding:0 8px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;margin:1.25rem 0 5px}
.nav-item{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:var(--r);color:var(--text2);cursor:pointer;font-size:13px;margin-bottom:2px;border:none;background:none;width:100%;text-align:left;transition:all .12s}
.nav-item:hover{background:var(--bg3);color:var(--text)}
.nav-item.on{background:var(--bg3);color:var(--text);font-weight:500}
.nav-item .ico{width:16px;text-align:center;flex-shrink:0;font-style:normal}
/* ── CARDS ── */
.card{background:var(--bg);border:0.5px solid var(--bd);border-radius:var(--rl);padding:1.25rem;margin-bottom:1rem}
.card-hd{padding:.875rem 1.25rem;border-bottom:0.5px solid var(--bd);font-size:13px;font-weight:500;display:flex;align-items:center;justify-content:space-between;gap:8px}
/* ── STATS ── */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-bottom:1.25rem}
.stat{background:var(--bg2);border-radius:var(--r);padding:.875rem}
.stat-lbl{font-size:11px;color:var(--text2);margin-bottom:4px}
.stat-val{font-size:24px;font-weight:600;color:var(--text);line-height:1}
/* ── INPUTS ── */
input,textarea,select{width:100%;padding:8px 10px;background:var(--bg2);border:0.5px solid var(--bd);border-radius:var(--r);color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;outline:none;transition:border-color .15s}
input:focus,textarea:focus,select:focus{border-color:var(--bd2);background:var(--bg)}
textarea{resize:vertical}
label{font-size:11px;color:var(--text2);display:block;margin-bottom:3px}
/* ── BUTTONS ── */
button{padding:8px 16px;background:var(--bg);border:0.5px solid var(--bd2);border-radius:var(--r);color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;transition:all .12s;display:inline-flex;align-items:center;gap:6px}
button:hover{background:var(--bg3)}
button:active{transform:scale(.98)}
button:disabled{opacity:.45;cursor:not-allowed;transform:none}
button.primary{background:var(--text);color:var(--bg);border-color:var(--text)}
button.primary:hover{opacity:.85;background:var(--text)}
button.sm{padding:4px 10px;font-size:11px}
button.danger{color:var(--dtx);border-color:var(--dbd)}
/* ── ALERTS ── */
.alert{padding:.625rem 1rem;border-radius:var(--r);font-size:13px;margin-bottom:.875rem}
.err{background:var(--dbg);color:var(--dtx);border:0.5px solid var(--dbd)}
.ok{background:var(--sbg);color:var(--stx);border:0.5px solid var(--sbd)}
.warn{background:var(--wbg);color:var(--wtx);border:0.5px solid var(--wbd)}
/* ── BADGES ── */
.bdg{display:inline-flex;align-items:center;padding:2px 8px;border-radius:100px;font-size:10px;font-weight:600;white-space:nowrap}
.bdg-admin{background:var(--wbg);color:var(--wtx)}
.bdg-writer{background:var(--ibg);color:var(--itx)}
.bdg-saved{background:var(--sbg);color:var(--stx)}
.bdg-india{background:#fff3f3;color:#c0392b}
.bdg-us{background:#f0f4ff;color:#2c4fa3}
.bdg-uae{background:#f0fff4;color:#1a7a3c}
.bdg-global{background:var(--pbg);color:var(--ptx)}
@media(prefers-color-scheme:dark){
  .bdg-india{background:#3d1010;color:#f09595}
  .bdg-us{background:#0a1a3d;color:#85b7eb}
  .bdg-uae{background:#0a2a14;color:#97c459}
}
.cat-bdg{display:inline-block;padding:1px 7px;border-radius:100px;font-size:10px;background:var(--bg3);color:var(--text2);border:0.5px solid var(--bd)}
/* ── TOGGLE ── */
.toggle{display:flex;background:var(--bg2);border-radius:var(--r);padding:3px;gap:3px;width:fit-content}
.tgl{padding:5px 14px;border:none;border-radius:6px;cursor:pointer;font-size:12px;background:none;color:var(--text2);transition:all .12s}
.tgl.on{background:var(--bg);color:var(--text);font-weight:500;border:0.5px solid var(--bd)}
/* ── TABLE ── */
.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th{text-align:left;padding:8px 12px;font-weight:500;font-size:11px;color:var(--text2);border-bottom:0.5px solid var(--bd);text-transform:uppercase;letter-spacing:.04em}
.tbl td{padding:11px 12px;border-bottom:0.5px solid var(--bd);color:var(--text);vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.tbl tbody tr:hover td{background:var(--bg2)}
/* ── SPINNER ── */
.spin{width:14px;height:14px;border:2px solid var(--bd2);border-top-color:var(--text2);border-radius:50%;animation:sp .65s linear infinite;flex-shrink:0}
@keyframes sp{to{transform:rotate(360deg)}}
/* ── PAGE HEADER ── */
.pg-hd{margin-bottom:1.5rem}
.pg-ttl{font-size:18px;font-weight:600;margin-bottom:3px}
.pg-sub{font-size:12px;color:var(--text2)}
/* ── LOGO ── */
.logo{width:34px;height:34px;background:var(--text);border-radius:8px;display:flex;align-items:center;justify-content:center;color:var(--bg);font-size:16px;font-family:'Noto Sans Kannada',sans-serif;font-weight:600;flex-shrink:0}
/* ── SEO BOX ── */
.seo-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:1rem 0}
.seo-item{background:var(--bg2);border-radius:var(--r);padding:.875rem}
.seo-lbl{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:5px}
.seo-val{font-size:12px;color:var(--text);word-break:break-word}
/* ── ARTICLE ITEMS ── */
.art-item{padding:1rem 1.25rem;border-bottom:0.5px solid var(--bd);cursor:pointer;transition:background .1s}
.art-item:last-child{border-bottom:none}
.art-item:hover{background:var(--bg2)}
.art-meta{font-size:11px;color:var(--text2);display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-top:4px}
/* ── TRENDING CARDS ── */
.trend-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px}
.trend-card{background:var(--bg);border:0.5px solid var(--bd);border-radius:var(--rl);padding:1rem;cursor:pointer;transition:all .15s;position:relative}
.trend-card:hover{border-color:var(--bd2);transform:translateY(-1px);box-shadow:0 4px 16px rgba(0,0,0,0.06)}
.trend-card.loading{opacity:.6;pointer-events:none}
.trend-ttl{font-size:13px;font-weight:500;color:var(--text);line-height:1.45;margin:8px 0 6px}
.trend-sum{font-size:11px;color:var(--text2);line-height:1.6;margin-bottom:8px}
.trend-ft{display:flex;align-items:center;justify-content:space-between;gap:8px}
.trend-gen-btn{padding:4px 10px;font-size:11px;background:var(--text);color:var(--bg);border:none;border-radius:6px;cursor:pointer;opacity:0;transition:opacity .15s}
.trend-card:hover .trend-gen-btn{opacity:1}
/* ── REGION FILTERS ── */
.filter-bar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1.25rem;align-items:center}
.filter-chip{padding:5px 12px;border-radius:100px;font-size:12px;border:0.5px solid var(--bd);background:var(--bg);color:var(--text2);cursor:pointer;transition:all .12s}
.filter-chip:hover{border-color:var(--bd2);color:var(--text)}
.filter-chip.on{background:var(--text);color:var(--bg);border-color:var(--text)}
/* ── OUTPUT ── */
.output-box{background:var(--bg);border:0.5px solid var(--bd);border-radius:var(--rl);padding:1.5rem;margin-top:1.25rem}
.discover-score{display:flex;align-items:center;gap:6px;padding:.625rem 1rem;background:var(--sbg);border-radius:var(--r);font-size:12px;color:var(--stx);border:0.5px solid var(--sbd);margin-bottom:1rem}
/* ── MISC ── */
.fade{animation:fd .2s ease}
@keyframes fd{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}
.ph{font-size:13px;color:var(--text2);text-align:center;padding:3rem}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
code{font-family:'DM Mono',monospace;background:var(--bg2);padding:1px 5px;border-radius:4px;font-size:12px}
a{color:var(--itx)}
.pulse{animation:pls 1.5s ease infinite}
@keyframes pls{0%,100%{opacity:1}50%{opacity:.4}}
.dot-india{width:7px;height:7px;border-radius:50%;background:#e74c3c;flex-shrink:0;display:inline-block}
.dot-us{width:7px;height:7px;border-radius:50%;background:#2c7be5;flex-shrink:0;display:inline-block}
.dot-uae{width:7px;height:7px;border-radius:50%;background:#27ae60;flex-shrink:0;display:inline-block}
.dot-global{width:7px;height:7px;border-radius:50%;background:var(--ptx);flex-shrink:0;display:inline-block}
@media(max-width:680px){
  .sidebar{position:static;width:100%;min-height:auto}
  .page{margin-left:0;padding:1.25rem}
  .app-shell{flex-direction:column}
  .seo-grid,.form-row{grid-template-columns:1fr}
  .trend-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div id="app"><div style="min-height:100vh;display:flex;align-items:center;justify-content:center"><div style="display:flex;align-items:center;gap:10px;color:var(--text2)"><div class="spin"></div>Loading ಕನ್ನಡ ದುನಿಯಾ CMS Pro…</div></div></div>

<script>
// ── CONFIG ────────────────────────────────────────────────────────────────────
const DEFAULT_KEY = '';
const SK = {U:'kdp_users',A:'kdp_articles',S:'kdp_session',K:'kdp_apikey'};
const SEED = {id:'u_admin_001',username:'admin',password:'admin@123',name:'Administrator',role:'admin',createdAt:new Date().toISOString()};
const MODEL = 'claude-sonnet-4-20250514';

// ── SYSTEM PROMPTS ────────────────────────────────────────────────────────────
const SYS_TRENDING = `You are a news intelligence engine. Search the web RIGHT NOW for the top 12 trending news stories across India, United States, and UAE.

Search queries to run:
- "India trending news today"
- "United States breaking news today"  
- "UAE news today"
- "India politics business technology today"
- "US latest news today"
- "Dubai Abu Dhabi news today"

Return ONLY a valid JSON array — no markdown, no backticks, no commentary. Each object:
{
  "id": "unique_id_1",
  "region": "India" | "US" | "UAE",
  "category": "Politics" | "Business" | "Technology" | "Sports" | "Entertainment" | "World" | "Science" | "Health",
  "title": "Compelling English headline (max 90 chars)",
  "summary": "2-sentence factual summary of what is happening (max 200 chars)",
  "sources": ["source name 1", "source name 2"],
  "keywords": ["kw1","kw2","kw3"]
}

Return exactly 12 items — 4 from India, 4 from US, 4 from UAE. Use real, current, verifiable stories.`;

const SYS_ARTICLE = `You are a senior journalist and SEO specialist at kannadadunia.com, Karnataka's most-read Kannada digital news portal.

TASK: Write a FRESH, ORIGINAL Kannada news article.

ABSOLUTE RULES:
1. DO NOT translate word-for-word. This is not a translation exercise.
2. Understand the story fully. Write as an original Kannada journalist.
3. Use pure, natural Kannada — not Kanglish or transliterated text.
4. Add context relevant to Karnataka/India readers.
5. The article must be 100% original, plagiarism-free, copyright-safe.

ARTICLE STRUCTURE (minimum 450 words):
• Para 1 — Strong news lead: WHO, WHAT, WHEN, WHERE, WHY
• Para 2 — Background and context for Kannada readers
• Para 3-4 — Key facts, details, data points (from verified sources)
• Para 5 — Analysis, implications, expert perspective
• Para 6 — Conclusion / future outlook / what to watch

GOOGLE DISCOVER OPTIMIZATION:
• Headline must be curiosity-driven but not clickbait (8-12 words ideal)
• Sub-headline adds crucial context to the headline
• First paragraph must hook the reader immediately
• Use active voice throughout
• Include timely, fresh angle that helps Google understand recency

SEO REQUIREMENTS (for kannadadunia.com):
• seoTitle: 58-65 characters, primary keyword first, in Kannada
• metaDescription: 155-160 characters, includes CTA, in Kannada  
• slug: 3-5 English words, hyphenated (e.g. india-economy-growth-2025)
• 6 focus keywords in Kannada (mix of broad and long-tail)
• schema: Article type (NewsArticle recommended)
• discoverScore: rate 1-10 how Google Discover-friendly this article is
• discoverTip: one specific tip to improve Discover performance

Return ONLY valid JSON, no markdown, no backticks:
{
  "headline": "Main Kannada headline",
  "subheadline": "Supporting Kannada sub-headline",
  "seoTitle": "Kannada SEO title",
  "metaDescription": "Kannada meta description",
  "slug": "english-url-slug",
  "keywords": ["k1","k2","k3","k4","k5","k6"],
  "schema": "NewsArticle",
  "discoverScore": 8,
  "discoverTip": "English tip for editor",
  "imageAlt": "Suggested featured image description in Kannada",
  "article": "Full Kannada article with \\n\\n between paragraphs",
  "wordCount": 480
}`;

// ── HELPERS ───────────────────────────────────────────────────────────────────
const uid = () => 'u'+Date.now().toString(36)+Math.random().toString(36).slice(2,5);
const todayStr = () => new Date().toISOString().slice(0,10);
const weekAgo = () => new Date(Date.now()-7*86400000).toISOString().slice(0,10);
const fD = d => new Date(d).toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'});
const fT = d => new Date(d).toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'});
const esc = s => s?String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'):'';
const ls = k => {try{const v=localStorage.getItem(k);return v?JSON.parse(v):null}catch{return null}};
const lss = (k,v) => {try{localStorage.setItem(k,JSON.stringify(v))}catch{}};

// ── STATE ─────────────────────────────────────────────────────────────────────
let S = {
  pg:'login', user:null, users:[], arts:[], apiKey:'',
  tab:'trending', atab:'dash', itype:'url',
  genning:false, genned:null, err:null, ok:null,
  xid:null, saved:'', lErr:'', settingsMsg:'',
  // Trending state
  trends:[], trendLoading:false, trendErr:null, trendLoaded:false,
  regionFilter:'All', catFilter:'All', trendGenId:null
};

// ── API ───────────────────────────────────────────────────────────────────────
async function apiCall(system, userMsg, useSearch=false) {
  const key = S.apiKey || DEFAULT_KEY;
  if (!key || !key.startsWith('sk-ant-')) throw new Error('Add your Anthropic API key in Settings first.');
  const body = {model:MODEL, max_tokens:3000, system, messages:[{role:'user',content:userMsg}]};
  if (useSearch) body.tools = [{type:'web_search_20250305',name:'web_search'}];
  let msgs = [{role:'user',content:userMsg}];
  for (let i=0; i<10; i++) {
    const rb = {...body, messages:msgs};
    const res = await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify(rb)
    });
    const d = await res.json();
    if (!res.ok) throw new Error(d.error?.message||`API Error ${res.status}`);
    const txt = (d.content||[]).filter(b=>b.type==='text');
    const tu  = (d.content||[]).filter(b=>b.type==='tool_use');
    if (d.stop_reason==='end_turn'||(!tu.length&&txt.length)){
      const t = txt.map(b=>b.text).join('');
      const c = t.replace(/```json\n?|```/g,'').trim();
      try{return JSON.parse(c)}catch{throw new Error('Parse error. Please try again.')}
    }
    if (tu.length){
      msgs.push({role:'assistant',content:d.content});
      msgs.push({role:'user',content:tu.map(tb=>({type:'tool_result',tool_use_id:tb.id,content:'Search executed successfully.'}))});
    } else break;
  }
  throw new Error('Generation failed. Please try again.');
}

// ── RENDER UTILS ──────────────────────────────────────────────────────────────
const regionDot = r => ({India:'dot-india',US:'dot-us',UAE:'dot-uae'}[r]||'dot-global');
const regionBdg = r => `<span class="bdg bdg-${(r||'global').toLowerCase()}"><span class="${regionDot(r)}" style="display:inline-block;width:6px;height:6px;border-radius:50%;margin-right:4px"></span>${esc(r)}</span>`;

function seoF(lbl,val,mono=false){
  return`<div class="seo-item"><div class="seo-lbl">${lbl}</div><div class="seo-val${mono?' kn':''}" ${mono?'':'style="font-family:\'DM Mono\',monospace;font-size:11px"'}>${esc(val)}</div></div>`;
}

function scoreBar(n){
  const pct=Math.round((n/10)*100);
  const col=n>=8?'var(--stx)':n>=6?'var(--wtx)':'var(--dtx)';
  return`<div style="display:flex;align-items:center;gap:8px">
    <div style="flex:1;height:5px;background:var(--bg3);border-radius:100px;overflow:hidden">
      <div style="width:${pct}%;height:100%;background:${col};border-radius:100px;transition:width .4s"></div>
    </div>
    <span style="font-size:12px;font-weight:600;color:${col};min-width:24px">${n}/10</span>
  </div>`;
}

// ── SIDEBAR ───────────────────────────────────────────────────────────────────
function renderSidebar(){
  const isAdmin = S.user?.role==='admin';
  const wrNav = !isAdmin?`
    <div class="nav-sec">Content</div>
    <button class="nav-item${S.tab==='trending'?' on':''}" onclick="setTab('trending')"><i class="ico">🔥</i>Trending Topics</button>
    <button class="nav-item${S.tab==='gen'?' on':''}" onclick="setTab('gen')"><i class="ico">✦</i>Generate Article</button>
    <button class="nav-item${S.tab==='mine'?' on':''}" onclick="setTab('mine')"><i class="ico">📄</i>My Articles</button>
    <button class="nav-item${S.tab==='settings'?' on':''}" onclick="setTab('settings')"><i class="ico">⚙</i>Settings</button>
  `:`
    <div class="nav-sec">Admin</div>
    <button class="nav-item${S.atab==='dash'?' on':''}" onclick="setATab('dash')"><i class="ico">◉</i>Dashboard</button>
    <button class="nav-item${S.atab==='users'?' on':''}" onclick="setATab('users')"><i class="ico">👥</i>Users</button>
    <button class="nav-item${S.atab==='arts'?' on':''}" onclick="setATab('arts')"><i class="ico">📋</i>All Articles</button>
    <div class="nav-sec">Content</div>
    <button class="nav-item${S.atab==='trending'?' on':''}" onclick="setATab('trending')"><i class="ico">🔥</i>Trending Topics</button>
    <button class="nav-item${S.atab==='gen'?' on':''}" onclick="setATab('gen')"><i class="ico">✦</i>Generate Article</button>
    <button class="nav-item${S.atab==='settings'?' on':''}" onclick="setATab('settings')"><i class="ico">⚙</i>Settings</button>
  `;
  return`<div class="sidebar">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:1.75rem">
      <div class="logo">ಕ</div>

          ${a.region?regionBdg(a.region):'<span></span>'}
          <div class="kn" style="font-size:13px;font-weight:500;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(a.headline)}</div>
          <div style="font-size:11px;color:var(--text2);flex-shrink:0">${esc(a.uname)} · ${fD(a.at)}</div>
          ${a.discoverScore?`<span style="font-size:11px;color:var(--stx);font-weight:500;flex-shrink:0">${a.discoverScore}/10</span>`:''}
        </div>`).join('')}
    </div>`:''}
  </div>`;
}

// ── ADMIN: USERS ──────────────────────────────────────────────────────────────
function renderUsers(){
  return`<div class="fade">
    <div class="pg-hd"><div class="pg-ttl">Users</div><div class="pg-sub">Manage team members and roles</div></div>
    <div class="card">
      <div style="font-size:13px;font-weight:500;margin-bottom:.875rem">Create New User</div>
      ${S.err?`<div class="alert err">${esc(S.err)}</div>`:''}
      ${S.ok?`<div class="alert ok">${esc(S.ok)}</div>`:''}
      <div class="form-row">
        <div><label>Full Name</label><input id="nn" type="text" placeholder="e.g. Priya Kumar"></div>
        <div><label>Username</label><input id="nu" type="text" placeholder="e.g. priya_kumar"></div>
        <div><label>Password</label><input id="np" type="password" placeholder="Min 6 characters"></div>
        <div><label>Role</label><select id="nr"><option value="writer">Writer</option><option value="admin">Admin</option></select></div>
      </div>
      <button onclick="doCreateUser()">Create User</button>
    </div>
    <div class="card" style="padding:0">
      <div class="card-hd">All Users (${S.users.length})</div>
      <table class="tbl"><thead><tr><th>Name</th><th>Username</th><th>Role</th><th>Joined</th><th>Articles</th><th></th></tr></thead><tbody>
        ${S.users.map(u=>{
          const ac=S.arts.filter(a=>a.uid===u.id).length;
          return`<tr>
            <td style="font-weight:500">${esc(u.name)}</td>
            <td><code>@${esc(u.username)}</code></td>
            <td><span class="bdg bdg-${u.role}">${u.role}</span></td>
            <td style="color:var(--text2)">${fD(u.createdAt)}</td>
            <td>${ac}</td>
            <td>${u.id!==S.user.id?`<button onclick="doDelUser('${u.id}')" class="sm danger">Delete</button>`:`<span style="font-size:11px;color:var(--text2)">You</span>`}</td>
          </tr>`;
        }).join('')}
      </tbody></table>
    </div>
  </div>`;
}

// ── ADMIN: ALL ARTICLES ───────────────────────────────────────────────────────
function renderAllArts(){
  const arts=[...S.arts].sort((a,b)=>new Date(b.at)-new Date(a.at));
  return`<div class="fade">
    <div class="pg-hd"><div class="pg-ttl">All Articles (${arts.length})</div><div class="pg-sub">Complete history across all writers</div></div>
    <div class="card" style="padding:0">
      ${!arts.length?`<div class="ph">No articles yet.</div>`:
        arts.map(a=>`<div class="art-item" onclick="toggleX('${a.id}')">
          <div style="font-size:14px;font-weight:500;font-family:'Noto Sans Kannada',sans-serif">${esc(a.headline)}</div>
          <div class="art-meta">
            ${a.region?regionBdg(a.region):''}
            <span style="font-weight:500">${esc(a.uname)}</span>
            <span>${fD(a.at)}, ${fT(a.at)}</span>
            ${a.discoverScore?`<span style="color:var(--stx);font-weight:500">Discover ${a.discoverScore}/10</span>`:''}
          </div>
          ${S.xid===a.id?`<div style="margin-top:.875rem;padding-top:.875rem;border-top:0.5px solid var(--bd)">
            <div class="seo-grid">${seoF('SEO Title',a.seoTitle,true)}${seoF('Meta',a.metaDescription,true)}</div>
            <div class="kn" style="font-size:14px;line-height:2;white-space:pre-wrap;margin-top:.875rem">${esc(a.article)}</div>
            <div style="display:flex;gap:8px;margin-top:.875rem">
              <button onclick="event.stopPropagation();cpArt('${a.id}')" class="sm">Copy</button>
              <button onclick="event.stopPropagation();delArt('${a.id}')" class="sm danger">Delete</button>
            </div>
          </div>`:''}
        </div>`).join('')}
    </div>
  </div>`;
}

// ── MAIN RENDER ───────────────────────────────────────────────────────────────
function render(){
  const el=document.getElementById('app');
  if(S.pg==='login'){el.innerHTML=renderLogin();return;}
  const isAdmin=S.user?.role==='admin';
  let main;
  if(isAdmin){
    main=({dash:renderDash,users:renderUsers,arts:renderAllArts,trending:renderTrending,gen:renderGen,settings:renderSettings}[S.atab]||renderDash)();
  }else{
    main=({trending:renderTrending,gen:renderGen,mine:renderMine,settings:renderSettings}[S.tab]||renderTrending)();
  }
  el.innerHTML=`<div class="app-shell">${renderSidebar()}<div class="page">${main}</div></div>`;
}

// ── ACTIONS ───────────────────────────────────────────────────────────────────
function doLogin(){
  const u=document.getElementById('lu')?.value?.trim();
  const p=document.getElementById('lp')?.value;
  const found=S.users.find(x=>x.username===u&&x.password===p);
  if(!found){S.lErr='Invalid username or password.';render();return;}
  S.user=found;S.pg='app';S.lErr='';lss(SK.S,found);render();
}
function doLogout(){S.user=null;S.pg='login';S.genned=null;S.err=null;S.ok=null;lss(SK.S,null);render();}
function setTab(t){S.tab=t;S.err=null;S.ok=null;S.xid=null;render();}
function setATab(t){S.atab=t;S.err=null;S.ok=null;S.xid=null;render();}
function setIT(t){S.itype=t;S.err=null;S.saved='';render();}
function toggleX(id){S.xid=S.xid===id?null:id;render();}
function setFilter(type,val){
  if(type==='region')S.regionFilter=val;
  else S.catFilter=val;
  render();
}

async function loadTrending(force=false){
  if(S.trendLoading)return;
  if(S.trendLoaded&&!force)return;
  S.trendLoading=true;S.trendErr=null;render();
  try{
    const data=await apiCall(SYS_TRENDING,'Search for the top 12 trending news stories right now from India, United States, and UAE. Return as JSON array.',true);
    S.trends=Array.isArray(data)?data:[];
    S.trendLoaded=true;S.trendLoading=false;render();
  }catch(e){
    S.trendErr=e.message;S.trendLoading=false;render();
  }
}

async function genFromTrend(id){
  const t=S.trends.find(x=>x.id===id);
  if(!t)return;
  S.trendGenId=id;S.genning=true;render();
  try{
    const prompt=`Write a fresh, original Kannada news article about this trending story:\n\nTitle: ${t.title}\nSummary: ${t.summary}\nRegion: ${t.region}\nCategory: ${t.category}\nSources: ${(t.sources||[]).join(', ')}\n\nSearch the web for the latest details and authentic sources about this story. Then write an original Kannada article — not a translation. Optimise for Google Discover.`;
    const art=await apiCall(SYS_ARTICLE,prompt,true);
    const rec={id:uid(),uid:S.user.id,username:S.user.username,uname:S.user.name,itype:'trend',region:t.region,category:t.category,trendTitle:t.title,at:new Date().toISOString(),...art};
    S.arts=[rec,...S.arts];lss(SK.A,S.arts);
    S.genned=art;S.trendGenId=null;S.genning=false;
    // Switch to generate tab to show output
    if(S.user.role==='admin')S.atab='gen'; else S.tab='gen';
    render();
  }catch(e){
    S.trendGenId=null;S.genning=false;
    S.trendErr=e.message;render();
  }
}

async function doGen(){
  const el=document.getElementById('src');
  const input=el?.value?.trim();
  if(!input){S.err='Please enter a URL or paste article content.';render();return;}
  S.saved=input;S.genning=true;S.err=null;S.ok=null;S.genned=null;render();
  try{
    const msg=S.itype==='url'
      ?`News article URL: ${input}\n\nFetch this page, find authentic details and sources, then write a fresh original Kannada article. NOT a translation. Optimise for Google Discover.`
      :`Source content:\n\n${input}\n\nWrite a fresh original Kannada article about this story. NOT a translation. Optimise for Google Discover.`;
    const art=await apiCall(SYS_ARTICLE,msg,S.itype==='url');
    const rec={id:uid(),uid:S.user.id,username:S.user.username,uname:S.user.name,itype:S.itype,src:input,at:new Date().toISOString(),...art};
    S.arts=[rec,...S.arts];lss(SK.A,S.arts);
    S.genned=art;S.ok='Article generated and saved!';S.genning=false;render();
  }catch(e){S.err=e.message;S.genning=false;render();}
}

function doCreateUser(){
  const name=document.getElementById('nn')?.value?.trim();
  const uname=document.getElementById('nu')?.value?.trim();
  const pass=document.getElementById('np')?.value;
  const role=document.getElementById('nr')?.value;
  if(!name||!uname||!pass){S.err='All fields are required.';render();return;}
  if(pass.length<6){S.err='Password must be at least 6 characters.';render();return;}
  if(S.users.find(u=>u.username===uname)){S.err=`Username "@${uname}" already taken.`;render();return;}
  const nu={id:uid(),username:uname,password:pass,name,role,createdAt:new Date().toISOString()};
  S.users=[...S.users,nu];lss(SK.U,S.users);S.ok=`User "${name}" created.`;S.err=null;render();
}

function doDelUser(id){
  if(!confirm('Delete this user? Their articles will remain.'))return;
  S.users=S.users.filter(u=>u.id!==id);lss(SK.U,S.users);S.ok='User deleted.';render();
}

function delArt(id){
  if(!confirm('Delete this article permanently?'))return;
  S.arts=S.arts.filter(a=>a.id!==id);lss(SK.A,S.arts);S.xid=null;render();
}

function saveKey(){
  const k=document.getElementById('ak')?.value?.trim();
  if(k&&!k.startsWith('sk-ant-')){S.settingsMsg='';alert('Invalid key. Anthropic keys start with sk-ant-');return;}
  S.apiKey=k;lss(SK.K,k);S.settingsMsg='API key saved successfully.';render();
}

function changePass(){
  const p1=document.getElementById('cp1')?.value;
  const p2=document.getElementById('cp2')?.value;
  if(!p1||p1.length<6){alert('Password must be at least 6 characters.');return;}
  if(p1!==p2){alert('Passwords do not match.');return;}
  S.users=S.users.map(u=>u.id===S.user.id?{...u,password:p1}:u);
  lss(SK.U,S.users);S.settingsMsg='Password updated.';render();
}

function cpAll(){
  const a=S.genned;if(!a)return;
  const t=`HEADLINE: ${a.headline}\nSUBHEADLINE: ${a.subheadline}\n\nSEO Title: ${a.seoTitle}\nMeta Description: ${a.metaDescription}\nSlug: /${a.slug}/\nSchema: ${a.schema}\nKeywords: ${(a.keywords||[]).join(', ')}\nDiscover Score: ${a.discoverScore}/10\nDiscover Tip: ${a.discoverTip}\nImage Alt: ${a.imageAlt}\n\n── ARTICLE ──\n\n${a.article}`;
  navigator.clipboard.writeText(t).then(()=>{
    const el=document.getElementById('cps');
    if(el){el.style.display='inline';setTimeout(()=>el.style.display='none',2000);}
  }).catch(()=>{});
}

function cpArt(id){
  const a=S.arts.find(x=>x.id===id);if(!a)return;
  navigator.clipboard.writeText(`${a.headline}\n\n${a.article}`).catch(()=>{});
}

Object.assign(window,{doLogin,doLogout,setTab,setATab,setIT,toggleX,setFilter,loadTrending,genFromTrend,doGen,doCreateUser,doDelUser,delArt,saveKey,changePass,cpAll,cpArt});

// ── INIT ──────────────────────────────────────────────────────────────────────
(function init(){
  let users=ls(SK.U);
  if(!users){users=[SEED];lss(SK.U,users);}
  S.users=users;
  S.arts=ls(SK.A)||[];
  S.apiKey=ls(SK.K)||'';
  const sess=ls(SK.S);
  if(sess){const fu=S.users.find(u=>u.id===sess.id);if(fu){S.user=fu;S.pg='app';}}
  render();
})();
</script>
</body>
</html>
